<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>New Tab</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%230a0a0a'/%3E%3Ccircle cx='16' cy='14' r='7' fill='none' stroke='%23c8ff00' stroke-width='2'/%3E%3Ccircle cx='16' cy='14' r='3' fill='%23c8ff00'/%3E%3Crect x='10' y='23' width='12' height='2' rx='1' fill='%23c8ff00' opacity='0.5'/%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400&family=Syne:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0a;
    --surface: #111111;
    --surface2: #1a1a1a;
    --border: rgba(255,255,255,0.07);
    --border2: rgba(255,255,255,0.13);
    --text: #f0f0f0;
    --text-muted: #666;
    --text-dim: #444;
    --accent: #c8ff00;
    --accent-dim: rgba(200,255,0,0.08);
    --accent-border: rgba(200,255,0,0.25);
    --font-display: 'Syne', sans-serif;
    --font-mono: 'DM Mono', monospace;
    --radius: 12px;
    --sidebar-w: 320px;
  }

  html, body {
    height: 100%;
    width: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-mono);
    overflow: hidden;
  }

  /* ─── SUBTLE GRID BACKGROUND ─── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
    background-size: 60px 60px;
    pointer-events: none;
    z-index: 0;
  }

  /* ─── MAIN LAYOUT ─── */
  #app {
    position: relative;
    z-index: 1;
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 40px;
    padding: 32px;
    transition: margin-right 0.35s cubic-bezier(.4,0,.2,1);
  }
  #app.sidebar-open { margin-right: var(--sidebar-w); }

  /* ─── CLOCK ─── */
  #clock-block { text-align: center; }
  #clock-time {
    font-family: var(--font-display);
    font-size: clamp(72px, 10vw, 110px);
    font-weight: 700;
    letter-spacing: -4px;
    line-height: 1;
    color: var(--text);
  }
  #clock-time span { color: var(--accent); }
  #clock-date {
    font-family: var(--font-mono);
    font-size: 13px;
    color: var(--text-muted);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-top: 8px;
  }

  /* ─── SEARCH ─── */
  #search-wrap {
    display: flex;
    align-items: center;
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: 100px;
    padding: 0 8px 0 20px;
    width: min(480px, 90vw);
    transition: border-color 0.2s;
  }
  #search-wrap:focus-within { border-color: var(--accent); }
  #search-input {
    flex: 1;
    background: none;
    border: none;
    outline: none;
    color: var(--text);
    font-family: var(--font-mono);
    font-size: 14px;
    padding: 14px 0;
    caret-color: var(--accent);
  }
  #search-input::placeholder { color: var(--text-dim); }
  #search-btn {
    background: var(--accent);
    border: none;
    border-radius: 100px;
    width: 36px; height: 36px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: opacity 0.15s;
  }
  #search-btn:hover { opacity: 0.85; }
  #search-btn svg { color: #000; }

  /* ─── SHORTCUTS ─── */
  #shortcuts {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    justify-content: center;
    max-width: 600px;
  }
  .shortcut {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 7px;
    text-decoration: none;
    color: var(--text-muted);
    font-size: 11px;
    letter-spacing: 0.05em;
    transition: color 0.2s;
    cursor: pointer;
  }
  .shortcut:hover { color: var(--text); }
  .shortcut-icon {
    width: 52px; height: 52px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    display: flex; align-items: center; justify-content: center;
    transition: border-color 0.2s, background 0.2s;
    overflow: hidden;
    position: relative;
  }
  .shortcut:hover .shortcut-icon {
    border-color: var(--border2);
    background: var(--surface2);
  }
  .shortcut-icon img { width: 28px; height: 28px; object-fit: contain; }
  .shortcut-label { max-width: 64px; text-align: center; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  /* ─── SETTINGS BTN (bottom right) ─── */
  #settings-btn {
    position: fixed;
    bottom: 24px; right: 24px;
    width: 42px; height: 42px;
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    color: var(--text-muted);
    transition: color 0.2s, border-color 0.2s, transform 0.3s;
    z-index: 100;
  }
  #settings-btn:hover { color: var(--text); border-color: var(--accent); }
  #settings-btn.active { transform: rotate(45deg); color: var(--accent); border-color: var(--accent); }

  /* ─── SIDEBAR ─── */
  #sidebar {
    position: fixed;
    top: 0; right: 0;
    width: var(--sidebar-w);
    height: 100vh;
    background: var(--surface);
    border-left: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    z-index: 200;
    transform: translateX(100%);
    transition: transform 0.35s cubic-bezier(.4,0,.2,1);
    overflow-y: auto;
  }
  #sidebar.open { transform: translateX(0); }

  .sb-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 20px 20px 16px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .sb-title {
    font-family: var(--font-display);
    font-size: 15px;
    font-weight: 600;
    letter-spacing: 0.05em;
    color: var(--text);
  }
  .sb-close {
    background: none; border: none; cursor: pointer;
    color: var(--text-muted); padding: 4px;
    transition: color 0.15s;
  }
  .sb-close:hover { color: var(--text); }

  .sb-section { padding: 16px 20px; border-bottom: 1px solid var(--border); }
  .sb-section-title {
    font-size: 10px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 12px;
  }

  /* ─── SITE LIST IN SIDEBAR ─── */
  #site-list { display: flex; flex-direction: column; gap: 6px; }
  .site-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 10px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
  }
  .site-item img { width: 20px; height: 20px; border-radius: 4px; flex-shrink: 0; }
  .site-item-info { flex: 1; min-width: 0; }
  .site-item-name { font-size: 12px; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .site-item-url { font-size: 10px; color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .site-delete {
    background: none; border: none; cursor: pointer;
    color: var(--text-dim); padding: 2px 4px; font-size: 14px;
    transition: color 0.15s; flex-shrink: 0;
  }
  .site-delete:hover { color: #ff4444; }

  /* ─── ADD FORM ─── */
  .add-form { display: flex; flex-direction: column; gap: 8px; }
  .add-form-row { display: flex; gap: 8px; }
  .add-input {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border2);
    border-radius: 8px;
    padding: 9px 12px;
    color: var(--text);
    font-family: var(--font-mono);
    font-size: 12px;
    outline: none;
    transition: border-color 0.2s;
  }
  .add-input:focus { border-color: var(--accent); }
  .add-input::placeholder { color: var(--text-dim); }
  .add-btn {
    background: var(--accent);
    border: none;
    border-radius: 8px;
    padding: 9px 14px;
    color: #000;
    font-family: var(--font-mono);
    font-size: 12px;
    font-weight: 400;
    cursor: pointer;
    transition: opacity 0.15s;
    white-space: nowrap;
  }
  .add-btn:hover { opacity: 0.85; }
  .add-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  #add-error { font-size: 11px; color: #ff6b6b; display: none; }
  #limit-notice { font-size: 11px; color: var(--text-muted); }

  /* ─── ANIMATIONS ─── */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }
  #clock-block { animation: fadeUp 0.5s ease both; }
  #search-wrap { animation: fadeUp 0.5s 0.1s ease both; }
  #shortcuts { animation: fadeUp 0.5s 0.2s ease both; }
</style>
</head>
<body>

<div id="app">
  <div id="clock-block">
    <div id="clock-time">00<span>:</span>00</div>
    <div id="clock-date">Loading...</div>
  </div>

  <div id="search-wrap">
    <input id="search-input" type="text" placeholder="Search Google..." autocomplete="off" spellcheck="false">
    <button id="search-btn" aria-label="Search">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
    </button>
  </div>

  <div id="shortcuts"></div>
</div>

<!-- Settings Button -->
<button id="settings-btn" aria-label="Manage shortcuts">
  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="12" cy="12" r="3"/>
    <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
  </svg>
</button>

<!-- Sidebar -->
<div id="sidebar">
  <div class="sb-header">
    <span class="sb-title">Shortcuts</span>
    <button class="sb-close" id="sidebar-close" aria-label="Close">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
      </svg>
    </button>
  </div>

  <div class="sb-section">
    <div class="sb-section-title">Add shortcut</div>
    <div class="add-form">
      <input class="add-input" id="add-name" type="text" placeholder="Name (e.g. GitHub)" maxlength="20">
      <input class="add-input" id="add-url" type="text" placeholder="URL (e.g. https://github.com)">
      <div class="add-form-row">
        <button class="add-btn" id="add-btn">Add site</button>
        <span id="limit-notice"></span>
      </div>
      <span id="add-error">Please enter a valid name and URL.</span>
    </div>
  </div>

  <div class="sb-section">
    <div class="sb-section-title">Your shortcuts</div>
    <div id="site-list"></div>
  </div>

  <div class="sb-section" style="margin-top:auto">
    <div class="sb-section-title">About</div>
    <div style="display:flex;flex-direction:column;gap:10px">
      <div style="display:flex;align-items:center;gap:10px">
        <div style="width:38px;height:38px;border-radius:50%;background:var(--accent-dim);border:1px solid var(--accent-border);display:flex;align-items:center;justify-content:center;flex-shrink:0">
          <span style="font-size:18px;line-height:1">🧠</span>
        </div>
        <div>
          <div style="font-family:var(--font-display);font-size:12px;font-weight:600;color:var(--accent);letter-spacing:0.05em">CYBO</div>
          <div style="font-size:10px;color:var(--text-muted);margin-top:1px">Coolest Young Brain Online 🌐</div>
        </div>
      </div>
      <p style="font-size:11px;color:var(--text-muted);line-height:1.6">Crafted in India with ❤️ and a curious mind.</p>
      <a href="mailto:cybo.buisness@gmail.com" style="font-size:11px;color:var(--accent);text-decoration:none;opacity:0.8;transition:opacity 0.15s" onmouseover="this.style.opacity=1" onmouseout="this.style.opacity=0.8">cybo.buisness@gmail.com</a>
      <div style="font-size:10px;color:var(--text-dim);border-top:1px solid var(--border);padding-top:10px;letter-spacing:0.05em">© 2025 CYBO. All rights reserved.</div>
    </div>
  </div>
</div>

<script>
const MAX_SITES = 6;

const DEFAULT_SITES = [
  { name: 'YouTube',     url: 'https://www.youtube.com/' },
  { name: 'Claude',      url: 'https://claude.ai/new' },
  { name: 'GitHub',      url: 'https://cybo-94.github.io/og-sites/' },
  { name: 'Gmail',       url: 'https://mail.google.com/' },
  { name: 'Drive',       url: 'https://drive.google.com/drive/' },
  { name: 'Moctale',     url: 'https://www.moctale.in/explore' },
];

function faviconUrl(url) {
  try {
    const host = new URL(url).hostname;
    return `https://www.google.com/s2/favicons?domain=${host}&sz=64`;
  } catch { return ''; }
}

function getSites() {
  try {
    const stored = localStorage.getItem('nt_sites');
    return stored ? JSON.parse(stored) : DEFAULT_SITES;
  } catch { return DEFAULT_SITES; }
}

function saveSites(sites) {
  localStorage.setItem('nt_sites', JSON.stringify(sites));
}

function renderShortcuts() {
  const sites = getSites();
  const el = document.getElementById('shortcuts');
  el.innerHTML = '';
  sites.forEach(site => {
    const a = document.createElement('a');
    a.className = 'shortcut';
    a.href = site.url;
    a.rel = 'noopener noreferrer';
    const iconDiv = document.createElement('div');
    iconDiv.className = 'shortcut-icon';
    const img = document.createElement('img');
    img.src = faviconUrl(site.url);
    img.alt = site.name;
    img.onerror = () => {
      img.style.display = 'none';
      iconDiv.innerHTML = `<span style="font-family:var(--font-display);font-size:18px;font-weight:700;color:var(--text-muted)">${site.name[0].toUpperCase()}</span>`;
    };
    iconDiv.appendChild(img);
    const label = document.createElement('span');
    label.className = 'shortcut-label';
    label.textContent = site.name;
    a.appendChild(iconDiv);
    a.appendChild(label);
    el.appendChild(a);
  });
}

function renderSiteList() {
  const sites = getSites();
  const list = document.getElementById('site-list');
  const notice = document.getElementById('limit-notice');
  const addBtn = document.getElementById('add-btn');
  list.innerHTML = '';
  notice.textContent = `${sites.length} / ${MAX_SITES} sites`;
  addBtn.disabled = sites.length >= MAX_SITES;
  if (!sites.length) {
    list.innerHTML = `<p style="font-size:12px;color:var(--text-dim)">No shortcuts yet.</p>`;
    return;
  }
  sites.forEach((site, i) => {
    const item = document.createElement('div');
    item.className = 'site-item';
    item.innerHTML = `
      <img src="${faviconUrl(site.url)}" alt="" onerror="this.style.display='none'">
      <div class="site-item-info">
        <div class="site-item-name">${site.name}</div>
        <div class="site-item-url">${site.url}</div>
      </div>
      <button class="site-delete" data-i="${i}" title="Remove">×</button>`;
    list.appendChild(item);
  });
  list.querySelectorAll('.site-delete').forEach(btn => {
    btn.addEventListener('click', () => {
      const sites = getSites();
      sites.splice(parseInt(btn.dataset.i), 1);
      saveSites(sites);
      renderShortcuts();
      renderSiteList();
    });
  });
}

document.getElementById('add-btn').addEventListener('click', () => {
  const name = document.getElementById('add-name').value.trim();
  const url = document.getElementById('add-url').value.trim();
  const err = document.getElementById('add-error');
  err.style.display = 'none';
  let finalUrl = url;
  if (finalUrl && !/^https?:\/\//i.test(finalUrl)) finalUrl = 'https://' + finalUrl;
  try { new URL(finalUrl); } catch { err.style.display = 'block'; return; }
  if (!name || !finalUrl) { err.style.display = 'block'; return; }
  const sites = getSites();
  if (sites.length >= MAX_SITES) return;
  sites.push({ name, url: finalUrl });
  saveSites(sites);
  document.getElementById('add-name').value = '';
  document.getElementById('add-url').value = '';
  renderShortcuts();
  renderSiteList();
});

const settingsBtn = document.getElementById('settings-btn');
const sidebar = document.getElementById('sidebar');
const app = document.getElementById('app');
settingsBtn.addEventListener('click', () => {
  const open = sidebar.classList.toggle('open');
  settingsBtn.classList.toggle('active', open);
  app.classList.toggle('sidebar-open', open);
  if (open) renderSiteList();
});
document.getElementById('sidebar-close').addEventListener('click', () => {
  sidebar.classList.remove('open');
  settingsBtn.classList.remove('active');
  app.classList.remove('sidebar-open');
});

document.getElementById('search-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') doSearch();
});
document.getElementById('search-btn').addEventListener('click', doSearch);
function doSearch() {
  const q = document.getElementById('search-input').value.trim();
  if (!q) return;
  let url;
  try { new URL(q); url = q; } catch { url = `https://www.google.com/search?q=${encodeURIComponent(q)}`; }
  window.location.href = url;
}

function updateClock() {
  const now = new Date();
  let h = now.getHours(), m = now.getMinutes();
  const ampm = h >= 12 ? 'PM' : 'AM';
  h = h % 12 || 12;
  const hStr = String(h).padStart(2, '0');
  const mStr = String(m).padStart(2, '0');
  document.getElementById('clock-time').innerHTML = `${hStr}<span>:</span>${mStr}<span style="font-size:0.35em;letter-spacing:0;margin-left:4px;vertical-align:middle">${ampm}</span>`;
  const days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  document.getElementById('clock-date').textContent = `${days[now.getDay()]}, ${now.getDate()} ${months[now.getMonth()]} ${now.getFullYear()}`;
}
updateClock();
setInterval(updateClock, 1000);

renderShortcuts();
</script>
</body>
</html>
